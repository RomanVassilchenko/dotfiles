[[columns]]
kind = "Pid"
style = "#@@base0A@@|#@@base0A@@"
numeric_search = true
nonnumeric_search = false
align = "Right"

[[columns]]
kind = "User"
style = "#@@base0B@@|#@@base0B@@"
numeric_search = false
nonnumeric_search = true
align = "Left"

[[columns]]
kind = "UsageCpu"
style = "ByPercentage"
numeric_search = false
nonnumeric_search = false
align = "Right"

[[columns]]
kind = "UsageMem"
style = "ByPercentage"
numeric_search = false
nonnumeric_search = false
align = "Right"

[[columns]]
kind = "CpuTime"
style = "#@@base0C@@|#@@base0C@@"
numeric_search = false
nonnumeric_search = false
align = "Right"

[[columns]]
kind = "MultiSlot"
style = "ByUnit"
numeric_search = false
nonnumeric_search = false
align = "Right"

[[columns]]
kind = "Separator"
style = "#@@base03@@|#@@base03@@"
numeric_search = false
nonnumeric_search = false
align = "Left"

[[columns]]
kind = "Command"
style = "#@@base05@@|#@@base05@@"
numeric_search = false
nonnumeric_search = true
align = "Left"

[style]
header = "#@@base0E@@|#@@base0E@@"
unit = "#@@base05@@|#@@base05@@"
tree = "#@@base03@@|#@@base03@@"

[style.by_percentage]
color_000 = "#@@base0D@@|#@@base0D@@"
color_025 = "#@@base0B@@|#@@base0B@@"
color_050 = "#@@base0A@@|#@@base0A@@"
color_075 = "#@@base09@@|#@@base09@@"
color_100 = "#@@base08@@|#@@base08@@"

[style.by_state]
color_d = "#@@base08@@|#@@base08@@"
color_r = "#@@base0B@@|#@@base0B@@"
color_s = "#@@base0D@@|#@@base0D@@"
color_t = "#@@base0C@@|#@@base0C@@"
color_z = "#@@base0E@@|#@@base0E@@"
color_x = "#@@base0E@@|#@@base0E@@"
color_k = "#@@base0A@@|#@@base0A@@"
color_w = "#@@base0A@@|#@@base0A@@"
color_p = "#@@base0A@@|#@@base0A@@"

[style.by_unit]
color_k = "#@@base0D@@|#@@base0D@@"
color_m = "#@@base0B@@|#@@base0B@@"
color_g = "#@@base0A@@|#@@base0A@@"
color_t = "#@@base09@@|#@@base09@@"
color_p = "#@@base08@@|#@@base08@@"
color_x = "#@@base0D@@|#@@base0D@@"

[search]
numeric_search = "Exact"
nonnumeric_search = "Partial"
logic = "And"
case = "Smart"

[display]
show_self = false
show_self_parents = false
show_thread = false
show_thread_in_tree = true
show_parent_in_tree = true
show_children_in_tree = true
show_header = true
show_footer = false
cut_to_terminal = true
cut_to_pager = false
cut_to_pipe = false
color_mode = "Always"
separator = "│"
ascending = "▲"
descending = "▼"
tree_symbols = ["│", "─", "┬", "├", "└"]
abbr_sid = true
theme = "Dark"
show_kthreads = true

[sort]
column = 2
order = "Descending"

[docker]
path = "unix:///var/run/docker.sock"

[pager]
mode = "Auto"
detect_width = false
use_builtin = false
